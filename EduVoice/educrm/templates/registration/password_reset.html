<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — EduVoice Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a6b3c 0%, #0d3d22 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: white; border-radius: 16px; padding: 2.25rem; width: 100%; max-width: 400px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); }
    .back { font-size: 0.82rem; color: #6b7280; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 1.5rem; }
    .back:hover { color: #1a6b3c; }
    .icon { font-size: 2rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.35rem; font-weight: 700; color: #1a1a2e; }
    p { color: #6b7280; font-size: 0.875rem; margin-top: 6px; line-height: 1.55; }
    .form-group { margin-top: 1.25rem; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
    input { width: 100%; padding: 0.7rem 0.9rem; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #1a6b3c; }
    .btn { width: 100%; margin-top: 1rem; padding: 0.8rem; background: #1a6b3c; color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .btn:hover { background: #145530; }
    .hint { font-size: 0.78rem; color: #9ca3af; margin-top: 0.9rem; text-align: center; line-height: 1.5; }
    .hint a { color: #1a6b3c; }
  </style>
</head>
<body>
<div class="card">
  <a href="/accounts/login/" class="back">← Back to sign in</a>
  <div class="icon">🔑</div>
  <h1>Reset your password</h1>
  <p>Enter the email address on your account. We'll send a link to reset your password.</p>

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_email">Email address</label>
      {{ form.email }}
    </div>
    <button type="submit" class="btn">Send reset link</button>
  </form>

  <p class="hint">
    Don't know your email? Ask your school admin to reset your account,
    or visit <a href="/admin/">/admin</a> if you're the superadmin.
  </p>
</div>
</body>
</html>
