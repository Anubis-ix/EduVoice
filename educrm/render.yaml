# render.yaml — deploy EduVoice Kenya to Render (https://render.com)
#
# HOW TO USE:
#   1. Push this repo to GitHub.
#   2. Go to https://dashboard.render.com → New → Blueprint.
#   3. Connect your GitHub repo and set Blueprint Path to: educrm/render.yaml
#   4. Click Apply — your app will be live at https://eduvoice-kenya.onrender.com
#
# NOTE: Free tier spins down after 15 min of inactivity (first request ~30s cold start).

services:
  - type: web
    name: eduvoice-kenya
    runtime: docker
    dockerfilePath: ./educrm/Dockerfile
    dockerContext: ./educrm
    plan: free
    region: oregon

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: EMAIL_BACKEND
        value: "console"
