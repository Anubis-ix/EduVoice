<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Updated — EduVoice Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a6b3c, #0d3d22); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: white; border-radius: 16px; padding: 2.25rem; width: 100%; max-width: 400px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); text-align: center; }
    .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.3rem; font-weight: 700; color: #1a6b3c; }
    p { color: #6b7280; font-size: 0.875rem; margin-top: 8px; }
    .btn { display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.75rem; background: #1a6b3c; color: white; border-radius: 10px; font-weight: 600; font-size: 0.9rem; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Password updated!</h1>
  <p>Your password has been changed successfully. You can now sign in with your new password.</p>
  <a href="/accounts/login/" class="btn">Sign in now →</a>
</div>
</body>
</html>
